<!-- templates/accounts/password_reset_complete.html -->
{% extends 'base.html' %}

{% block title %}Паролата е възстановена - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-check-circle"></i> Паролата е възстановена</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Успешно възстановяване!</h3>
                <p class="text-muted">
                    Вашата парола беше променена успешно. Сега можете да влезете в профила си с новата парола.
                </p>

                <div class="d-grid gap-2 mt-4">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Вход в профила
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!-- templates/accounts/password_change_done.html -->
{% extends 'base.html' %}

{% block title %}Паролата е сменена - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-check-circle"></i> Успешна смяна на парола</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Паролата е сменена успешно!</h3>
                <p class="text-muted">Вашата парола беше променена. Сега можете да влезете с новата си парола.</p>

                <div class="d-grid gap-2 mt-4">
                    <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
                        <i class="fas fa-user"></i> Към профила
                    </a>
                    <a href="{% url 'core:index' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-home"></i> Към началната страница
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!-- product_confirm_delete.html -->
{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>Потвърждение за изтриване</h2>

    <p>Сигурни ли сте, че искате да изтриете продукт "{{ object.name }}"?</p>
    <p class="text-danger"><strong>Това действие е необратимо.</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, изтрий</button>
        <a href="{% url 'products:product_detail' object.id %}" class="btn btn-secondary">Отказ</a>
    </form>
</div>
{% endblock %}

<!-- techShop/templates/orders/order_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Изтриване на поръчка{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>Потвърждение за изтриване</h4>
                </div>
                <div class="card-body">
                    <p>Сигурни ли сте, че искате да изтриете поръчка №{{ object.id }} на {{ object.customer_name }}?</p>
                    <p class="text-danger">Това действие е необратимо.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'orders:order_detail' object.id %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Отказ
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Да, изтрий
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

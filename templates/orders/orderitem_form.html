{% extends 'base.html' %}

{% block title %}Добави продукт към поръчка{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4>Добави продукт към поръчка №{{ view.kwargs.order_id }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Добави</button>
                        <a href="{% url 'orders:order_detail' view.kwargs.order_id %}" class="btn btn-secondary w-100 mt-2">Отказ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<div class="card product-card h-100">
    {% if product.image %}
    <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.title }}">
    {% else %}
    <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="No image">
    {% endif %}

    <div class="card-body">
        <h5 class="card-title">{{ product.title }}</h5>
        <p class="card-text">{{ product.description|truncatechars:100 }}</p>
        <p class="card-text"><strong>{{ product.price }} €.</strong></p>

        <div class="d-flex justify-content-between">
            <a href="{% url 'products:product_detail' product.id %}" class="btn btn-primary">
                Детайли
            </a>
            {% if request.user.is_authenticated %}
            <a href="{% url 'orders:add_to_cart' product.id %}" class="btn btn-success">
                <i class="fas fa-shopping-cart"></i>
            </a>
            {% endif %}
        </div>
    </div>
</div>

<!--templates/reviews/review_form.html-->
{% extends 'base.html' %}

{% block title %}Добави отзив{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3>Отзив за продукт: {{ product.name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Изпрати</button>
                        <a href="{% url 'products:detail' product.pk %}" class="btn btn-secondary">Отказ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
